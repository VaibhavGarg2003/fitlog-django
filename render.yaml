# Render Blueprint — fitlog-django
# ══════════════════════════════════
# One always-on web service on Render's free tier. Deploy via the Render
# dashboard: New → Blueprint → pick this repo. Secrets (sync:false) are
# pasted in the dashboard, never committed here.
#
# The service spins down after ~15 min idle (free tier); the GitHub Actions
# keepalive ping blunts the cold start — acceptable for share-link traffic.

services:
  - type: web
    name: fitlog-django
    runtime: python
    plan: free
    region: singapore # closest Render region to India
    branch: main
    buildCommand: "./build.sh"
    # Bind to 0.0.0.0 (accept external traffic, not just localhost) on the
    # port Render assigns via $PORT — gunicorn's 127.0.0.1:8000 default is
    # unreachable from Render's proxy and fails the health check.
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    healthCheckPath: /api/healthz
    envVars:
      # Non-secret, safe to commit — force prod settings + pin Python.
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: PYTHON_VERSION
        value: "3.12.7"
      # ── Secrets — set these in the Render dashboard (sync:false) ──
      - key: DJANGO_SECRET_KEY
        sync: false
      # SESSION POOLER (host "*.pooler.supabase.com", port 5432, username
      # "postgres.<project-ref>") — NOT the direct connection. The direct
      # hostname (db.<ref>.supabase.co) resolves ONLY to an IPv6 address;
      # Render's free tier has no IPv6 egress, so it cannot reach it at
      # runtime. The pooler resolves to real IPv4 addresses. Session mode
      # (not the 6543 transaction mode) is Supabase's own recommendation
      # for a persistent server process like this one (vs. serverless).
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL # prod project URL (drives JWT verification)
        sync: false
      - key: CORS_ALLOWED_ORIGINS # the Next.js Vercel origin(s), comma-separated
        sync: false
